name: CI

on:
  push:
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinelx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sentinelx/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  detection-engine:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sentinelx/detection-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py
